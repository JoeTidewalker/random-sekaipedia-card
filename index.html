<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Sekaipedia Card</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 15%;
      background: #f5f5f5;
    }
    button {
      font-size: 20px;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    p { margin-top: 20px; color: #555; }
  </style>
</head>
<body>

  <h1>🎴 Random Card Generator</h1>
  <button onclick="go()">Get Random Card</button>
  <p id="status"></p>

  <script>
    async function go() {
      const status = document.getElementById("status");
      status.textContent = "Loading card list...";

      try {
        // Fetch the full list page (HTML, not API → no CORS block)
        let res = await fetch("https://corsproxy.io/?https://www.sekaipedia.org/wiki/List_of_cards");
        let html = await res.text();

        // Parse HTML
        let parser = new DOMParser();
        let doc = parser.parseFromString(html, "text/html");

        // Get all links
        let links = [...doc.querySelectorAll("a")];

        // Filter valid card links
        let cardLinks = links
          .map(a => a.getAttribute("href"))
          .filter(href =>
            href &&
            href.startsWith("/wiki/") &&
            !href.includes(":") && // removes Category:, File:, etc.
            !href.includes("#")
          );

        if (cardLinks.length === 0) {
          throw new Error("No cards found");
        }

        status.textContent = "Picking a random card...";

        let random = cardLinks[Math.floor(Math.random() * cardLinks.length)];

        window.location.href = "https://www.sekaipedia.org" + random;

      } catch (e) {
        console.error(e);
        status.textContent = "Error 😢 (try again)";
      }
    }
  </script>

</body>
</html>
