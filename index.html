<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Sekaipedia Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 15%;
      background: #f5f5f5;
    }
    button {
      font-size: 20px;
      padding: 15px 30px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
    }
    button:hover {
      background-color: #45a049;
    }
    p {
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>🎴 Get random card</h1>
  <button onclick="getRandomCard()">Get Random Card</button>
  <p id="status"></p>

  <script>
    async function getRandomCard() {
      const status = document.getElementById("status");
      status.textContent = "Loading cards...";

      let allPages = [];
      let cmcontinue = "";

      try {
        do {
          let url = `https://www.sekaipedia.org/api.php?action=query&list=categorymembers&cmtitle=Category:Cards&cmlimit=500&format=json&origin=*${cmcontinue ? "&cmcontinue=" + cmcontinue : ""}`;
          let res = await fetch(url);
          let data = await res.json();

          allPages.push(...data.query.categorymembers);
          cmcontinue = data.continue ? data.continue.cmcontinue : "";

        } while (cmcontinue);

        status.textContent = "Picking a random card...";
        let randomPage = allPages[Math.floor(Math.random() * allPages.length)];

        window.location.href = "https://www.sekaipedia.org/wiki/" + encodeURIComponent(randomPage.title);

      } catch (e) {
        status.textContent = "Error loading cards 😢";
        console.error(e);
      }
    }
  </script>

</body>
</html>
